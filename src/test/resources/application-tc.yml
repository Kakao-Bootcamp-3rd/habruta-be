spring:
  datasource:
    driver-class-name: org.postgresql.Driver  # application.yml의 H2 드라이버 override
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration   # db/testdata 유입 방지
  rabbitmq:
    listener:
      simple:
        auto-startup: false             # Rabbit 컨테이너 없이 컨텍스트 로딩 허용

logging:
  level:
    com.imyme.mine: DEBUG
    org.hibernate.SQL: DEBUG